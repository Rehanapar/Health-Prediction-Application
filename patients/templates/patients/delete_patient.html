{% extends 'patients/base.html' %}

{% block content %}

<div class="delete-box">

    <h2>Delete Patient</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ patient.full_name }}</strong>?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button class="delete-btn">
            Yes, Delete
        </button>

        <a href="{% url 'patient_list' %}" class="cancel">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
