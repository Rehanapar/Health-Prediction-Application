{% extends 'patients/base.html' %}

{% block content %}

<h2>Add Patient</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn">
        Save
    </button>

    <a href="{% url 'patient_list' %}" class="cancel">
        Cancel
    </a>

</form>

{% endblock %}
